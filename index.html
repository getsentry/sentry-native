<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1, user-scalable=yes" />
    <style>
      html {
        font-family: BlinkMacSystemFont,-apple-system,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Fira Sans","Droid Sans","Helvetica Neue",Helvetica,Arial,sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: #fff;
        font-size: 16px;
      }
      body {
        color: #4a4a4a;
        margin: 8px;
        font-size: 1em;
        font-weight: 400;
      }
      header {
        margin-bottom: 8px;
        display: flex;
        flex-direction: column;
      }
      main {
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      a {
        color: #3273dc;
        cursor: pointer;
        text-decoration: none;
      }
      a:hover {
        color: #000;
      }
      button {
        color: #fff;
        background-color: #3298dc;
        border-color: transparent;
        cursor: pointer;
        text-align: center;
      }
      button:hover {
        background-color: #2793da;
        flex: none;
      }
      .spacer {
        flex: auto;
      }
      .small {
        font-size: 0.75rem;
      }
      footer {
        margin-top: 16px;
        display: flex;
        align-items: center;
      }
      .header-label {
        margin-right: 4px;
      }
      .benchmark-set {
        margin: 8px 0;
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      .benchmark-title {
        font-size: 3rem;
        font-weight: 600;
        word-break: break-word;
        text-align: center;
      }
      .benchmark-graphs {
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
        flex-wrap: wrap;
        width: 100%;
      }
      .benchmark-chart {
        max-width: 1000px;
      }
    </style>
    <title>Benchmarks</title>
  </head>

  <body>
    <header id="header">
      <div class="header-item">
        <strong class="header-label">Last Update:</strong>
        <span id="last-update"></span>
      </div>
      <div class="header-item">
        <strong class="header-label">Repository:</strong>
        <a id="repository-link" rel="noopener"></a>
      </div>
    </header>
    <main id="main"></main>
    <footer>
      <button id="dl-button">Download data as JSON</button>
      <div class="spacer"></div>
      <div class="small">Powered by <a rel="noopener" href="https://github.com/marketplace/actions/continuous-benchmark">github-action-benchmark</a></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.2/dist/Chart.min.js"></script>
    <script src="data.js"></script>
    <script id="main-script">
      'use strict';
      (function() {
        // Colors from https://github.com/github/linguist/blob/master/lib/linguist/languages.yml
        const toolColors = {
          cargo: '#dea584',
          go: '#00add8',
          benchmarkjs: '#f1e05a',
          benchmarkluau: '#000080',
          pytest: '#3572a5',
          googlecpp: '#f34b7d',
          catch2: '#f34b7d',
          julia: '#a270ba',
          jmh: '#b07219',
          benchmarkdotnet: '#178600',
          customBiggerIsBetter: '#38ff38',
          customSmallerIsBetter: '#ff3838',
          _: '#333333'
        };

        const seriesColors = {
          inproc: '#0072b2',
          breakpad: '#009e73',
          crashpad: '#d55e00',
          native: '#cc79a7',
        };

        const maxVisibleDataPoints = 100;

        function init() {
          function parseBenchName(name) {
            const match = name.match(/^(.*) \(([^()]+)\)$/);
            if (match) {
              return {
                chartName: match[1],
                seriesName: match[2],
              };
            }
            return {
              chartName: name,
              seriesName: name,
            };
          }

          function createChartData() {
            return {
              points: [],
              series: new Map(),
            };
          }

          function entryKey(entry) {
            return entry.commit.id + ':' + entry.date;
          }

          function ensureSeries(chartData, name) {
            let series = chartData.series.get(name);
            if (series !== undefined) {
              return series;
            }

            series = {
              name,
              values: new Array(chartData.points.length).fill(null),
              points: new Array(chartData.points.length).fill(null),
            };
            chartData.series.set(name, series);
            return series;
          }

          function collectBenchesPerChart(entries) {
            const map = new Map();
            const points = entries.map(entry => ({
              commit: entry.commit,
              date: entry.date,
              tool: entry.tool,
            }));
            const pointIndexByEntry = new Map(points.map((point, index) => [entryKey(point), index]));

            for (const entry of entries) {
              const {commit, date, tool, benches} = entry;
              for (const bench of benches) {
                const result = { commit, date, tool, bench };
                const {chartName, seriesName} = parseBenchName(bench.name);
                let chartData = map.get(chartName);
                if (chartData === undefined) {
                  chartData = createChartData();
                  chartData.points = points;
                  map.set(chartName, chartData);
                }

                const index = pointIndexByEntry.get(entryKey(result));
                const series = ensureSeries(chartData, seriesName);
                series.values[index] = bench.value;
                series.points[index] = result;
              }
            }
            return map;
          }

          const data = window.BENCHMARK_DATA;

          // Render header
          document.getElementById('last-update').textContent = new Date(data.lastUpdate).toString();
          const repoLink = document.getElementById('repository-link');
          repoLink.href = data.repoUrl;
          repoLink.textContent = data.repoUrl;

          // Render footer
          document.getElementById('dl-button').onclick = () => {
            const dataUrl = 'data:,' + JSON.stringify(data, null, 2);
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = 'benchmark_data.json';
            a.click();
          };

          // Prepare data points for charts
          return Object.keys(data.entries).map(name => ({
            name,
            dataSet: collectBenchesPerChart(data.entries[name]),
          }));
        }

        function renderAllChars(dataSets) {

          function colorForSeries(name, index) {
            if (seriesColors[name]) {
              return seriesColors[name];
            }
            const fallbackColors = [
              toolColors._,
              '#f0e442',
              '#56b4e9',
              '#e69f00',
              '#000000',
            ];
            return fallbackColors[index % fallbackColors.length];
          }

          function firstLine(text) {
            const newlineIndex = text.indexOf('\n');
            return newlineIndex === -1 ? text : text.slice(0, newlineIndex);
          }

          function firstBench(chartData) {
            for (const series of chartData.series.values()) {
              for (const point of series.points) {
                if (point) {
                  return point.bench;
                }
              }
            }
            return undefined;
          }

          function seriesForTooltip(chartData, item) {
            return Array.from(chartData.series.values())[item.datasetIndex];
          }

          function pointForTooltip(chartData, item) {
            const series = seriesForTooltip(chartData, item);
            return series ? series.points[item.index] : undefined;
          }

          function chartValues(seriesData) {
            const values = [];
            for (const series of seriesData) {
              for (const value of series.values) {
                if (typeof value === 'number' && isFinite(value)) {
                  values.push(value);
                }
              }
            }
            return values;
          }

          function shouldUseLogScale(seriesData) {
            const values = chartValues(seriesData);
            return values.length > 0 && values.every(value => value > 0);
          }

          function trimTrailingZeros(value) {
            return value.replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, '');
          }

          function formatLogTick(value) {
            const numericValue = Number(value);
            if (!isFinite(numericValue) || numericValue <= 0) {
              return '';
            }

            const exponent = Math.floor(Math.log10(numericValue));
            const mantissa = numericValue / Math.pow(10, exponent);
            if (![1, 2, 5].some(value => Math.abs(mantissa - value) < 1e-10)) {
              return '';
            }

            const absValue = Math.abs(numericValue);
            if (absValue >= 1000) {
              return trimTrailingZeros((numericValue / 1000).toFixed(absValue >= 10000 ? 0 : 1)) + 'k';
            }
            if (absValue >= 100) {
              return Math.round(numericValue).toString();
            }
            if (absValue >= 10) {
              return trimTrailingZeros(numericValue.toFixed(1));
            }
            if (absValue >= 1) {
              return trimTrailingZeros(numericValue.toFixed(2));
            }
            if (absValue >= 0.001) {
              return trimTrailingZeros(numericValue.toFixed(4));
            }
            return trimTrailingZeros(numericValue.toPrecision(2));
          }

          function medianAxisLabel(unit, useLogScale) {
            if (useLogScale) {
              return 'Median' + (unit ? ` (${unit}, LOG)` : ' (LOG)');
            }
            return 'Median' + (unit ? ` (${unit})` : '');
          }

          function lastVisibleChartData(chartData) {
            const startIndex = Math.max(chartData.points.length - maxVisibleDataPoints, 0);
            if (startIndex === 0) {
              return chartData;
            }

            const series = new Map();
            for (const [name, sourceSeries] of chartData.series.entries()) {
              series.set(name, {
                name,
                values: sourceSeries.values.slice(startIndex),
                points: sourceSeries.points.slice(startIndex),
              });
            }

            return {
              points: chartData.points.slice(startIndex),
              series,
            };
          }

          function renderGraph(parent, name, chartData) {
            const canvas = document.createElement('canvas');
            canvas.className = 'benchmark-chart';
            parent.appendChild(canvas);

            const visibleData = lastVisibleChartData(chartData);
            const seriesData = Array.from(visibleData.series.values());
            const data = {
              labels: visibleData.points.map(d => d.commit.id.slice(0, 7)),
              datasets: seriesData.map((series, index) => {
                const color = colorForSeries(series.name, index);
                return {
                  label: series.name,
                  data: series.values.map(value => value === null ? NaN : value),
                  borderColor: color,
                  backgroundColor: color + '60', // Add alpha for #rrggbbaa
                  fill: false,
                  spanGaps: false,
                };
              }),
            };
            const bench = firstBench(visibleData);
            const unit = bench ? bench.unit : '';
            const useLogScale = shouldUseLogScale(seriesData);
            const yAxis = {
              scaleLabel: {
                display: true,
                labelString: medianAxisLabel(unit, useLogScale),
              },
              ticks: {},
            };
            if (useLogScale) {
              yAxis.type = 'logarithmic';
              yAxis.ticks.autoSkip = false;
              yAxis.ticks.callback = formatLogTick;
            } else {
              yAxis.ticks.beginAtZero = true;
            }
            const options = {
              title: {
                display: true,
                text: name,
              },
              legend: {
                display: true,
              },
              scales: {
                xAxes: [
                  {
                    scaleLabel: {
                      display: true,
                      labelString: 'commit',
                    },
                  }
                ],
                yAxes: [yAxis],
              },
              tooltips: {
                callbacks: {
                  afterTitle: items => {
                    const data = pointForTooltip(visibleData, items[0]);
                    if (!data) {
                      return '';
                    }
                    return '\n' + firstLine(data.commit.message) + '\n\n' + data.commit.timestamp + ' by @' + data.commit.author.username + '\n';
                  },
                  label: item => {
                    const data = pointForTooltip(visibleData, item);
                    if (!data) {
                      return '';
                    }
                    const { range, unit } = data.bench;
                    let label = data.bench.value + ' ' + unit;
                    if (range) {
                      label += ' (' + range + ')';
                    }
                    const series = seriesForTooltip(visibleData, item);
                    return (series ? series.name : data.bench.name) + ': ' + label;
                  },
                  afterLabel: item => {
                    const data = pointForTooltip(visibleData, item);
                    if (!data) {
                      return '';
                    }
                    const { extra } = data.bench;
                    return extra ? '\n' + extra : '';
                  }
                }
              },
              onClick: (_mouseEvent, activeElems) => {
                if (activeElems.length === 0) {
                  return;
                }
                // XXX: Undocumented. How can we know the index?
                const index = activeElems[0]._index;
                const datasetIndex = activeElems[0]._datasetIndex;
                const data = seriesData[datasetIndex].points[index];
                if (data) {
                  window.open(data.commit.url, '_blank');
                }
              },
            };

            new Chart(canvas, {
              type: 'line',
              data,
              options,
            });
          }

          function renderBenchSet(name, benchSet, main) {
            const setElem = document.createElement('div');
            setElem.className = 'benchmark-set';
            main.appendChild(setElem);

            const nameElem = document.createElement('h1');
            nameElem.className = 'benchmark-title';
            nameElem.textContent = name;
            setElem.appendChild(nameElem);

            const graphsElem = document.createElement('div');
            graphsElem.className = 'benchmark-graphs';
            setElem.appendChild(graphsElem);

            for (const [benchName, chartData] of benchSet.entries()) {
              renderGraph(graphsElem, benchName, chartData)
            }
          }

          const main = document.getElementById('main');
          for (const {name, dataSet} of dataSets) {
            renderBenchSet(name, dataSet, main);
          }
        }

        renderAllChars(init()); // Start
      })();
    </script>
  </body>
</html>
