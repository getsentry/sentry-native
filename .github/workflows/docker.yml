name: Docker

on:
  push:
    branches:
      - master
    paths:
      - '.github/docker/**'
      - 'tests/requirements.txt'
  workflow_dispatch:

jobs:
  alpine:
    name: Build alpine:${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - '3.21'
          - '3.23'

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sentry-native-alpine:${{ matrix.version }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2

      - name: Copy test requirements
        run: |
          git update-index --assume-unchanged .github/docker/alpine/requirements.txt
          cp tests/requirements.txt .github/docker/alpine/requirements.txt

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # pin@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_NAME }}
          context: .github/docker/alpine
          build-args: |
            BASE=alpine:${{ matrix.version }}
            PIP_INSTALL=${{ matrix.version == '3.23' && 'mitmproxy' || '' }}
