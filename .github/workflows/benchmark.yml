name: Benchmark

on:
  push:
    branches:
      - master
    paths-ignore:
      - "*.md"
  pull_request:
    paths-ignore:
      - "*.md"

permissions:
  deployments: write
  contents: write

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Linux dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt update
          sudo apt install -y libcurl4-openssl-dev

      - name: Benchmark
        shell: bash
        run: |
          pip install --upgrade --requirement tests/requirements.txt
          pytest --verbose --benchmark_out=benchmark.json tests/benchmark.py

      - uses: benchmark-action/github-action-benchmark@a60cea5bc7b49e15c1f58f411161f99e0df48372 # pin@v1.22.0
        if: ${{ github.event_name == 'push' }}
        with:
          name: ${{ runner.os }}
          tool: customSmallerIsBetter
          output-file-path: benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          benchmark-data-dir-path: ./
          auto-push: true
